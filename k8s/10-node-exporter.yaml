# Pieza 1 — Exporter: expone métricas del sistema en /metrics (puerto 9100).
# En la demo se ve en http://localhost:9100/metrics vía port-forward.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-exporter
  namespace: prometheus-demo
  labels:
    app: node-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-exporter
  template:
    metadata:
      labels:
        app: node-exporter
    spec:
      containers:
        - name: node-exporter
          image: prom/node-exporter:v1.8.2
          args:
            - "--web.listen-address=:9100"
          ports:
            - name: metrics
              containerPort: 9100
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: node-exporter
  namespace: prometheus-demo
  labels:
    app: node-exporter
spec:
  selector:
    app: node-exporter
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
