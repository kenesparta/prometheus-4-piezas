# Pieza 2 — El servidor: scrapea los targets y guarda series temporales.
# UI en http://localhost:9090 (port-forward) o en la IP pública del Service
# `prometheus-publico` (LoadBalancer, más abajo): /targets, /graph, /alerts.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: prometheus-demo
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v3.0.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            # Permite recargar la config en caliente con:
            #   curl -X POST http://localhost:9090/-/reload
            - "--web.enable-lifecycle"
          ports:
            - name: web
              containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: prometheus-demo
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: web
      port: 9090
      targetPort: 9090
---
# IP pública para proyectar la UI de Prometheus durante la charla (las 4 piezas:
# /targets, el expression browser de PromQL y /alerts). Se mantiene el Service
# interno `prometheus` de arriba porque Grafana y el scrape lo usan por DNS.
apiVersion: v1
kind: Service
metadata:
  name: prometheus-publico
  namespace: prometheus-demo
  labels:
    app: prometheus
spec:
  type: LoadBalancer
  selector:
    app: prometheus
  ports:
    - name: web
      port: 80
      targetPort: 9090
