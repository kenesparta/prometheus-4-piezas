# Pieza 1 (aplicada a una app real) — pokeapi: la demo interactiva en
# Rust + Leptos que el público usa desde su navegador. Expone /metrics y el
# Prometheus de la pieza 2 la scrapea como un target más (job "pokeapi").
#
# Requisitos antes de aplicar:
#   1. Imagen publicada: la construye GitHub Actions
#      (.github/workflows/pokeapi-imagen.yml) desde pokeapi/Dockerfile y la
#      publica en GitHub Packages como ghcr.io/kenesparta/pokeapi. Tras el
#      primer push hay que hacer el package PÚBLICO (Package settings →
#      Change visibility); si no, el pod cae en ImagePullBackOff por falta
#      de imagePullSecret.
#   2. Secret con la URL de Redis (¡nunca se commitea!); las credenciales
#      reales viven en k8s/secrets.local.yaml (gitignorado):
#        kubectl apply -f k8s/secrets.local.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pokeapi
  namespace: prometheus-demo
  labels:
    app: pokeapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pokeapi
  template:
    metadata:
      labels:
        app: pokeapi
    spec:
      containers:
        - name: pokeapi
          # La publica .github/workflows/pokeapi-imagen.yml (GHCR); el
          # package debe ser público para poder bajarla sin credenciales.
          image: ghcr.io/kenesparta/pokeapi:latest
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: pokeapi-redis
                  key: REDIS_URL
            # Password de la demo, tal como se cuenta en la charla (admin/123).
            - name: ADMIN_PASSWORD
              value: "123"
            - name: RUST_LOG
              value: "info,backend=info"
          readinessProbe:
            httpGet:
              path: /salud
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /salud
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
---
# Service interno: es el target que scrapea Prometheus (pokeapi:3000).
apiVersion: v1
kind: Service
metadata:
  name: pokeapi
  namespace: prometheus-demo
  labels:
    app: pokeapi
spec:
  selector:
    app: pokeapi
  ports:
    - name: http
      port: 3000
      targetPort: http
---
# Service público: la URL que se comparte con el público de la charla.
# La IP externa sale con:
#   kubectl -n prometheus-demo get svc pokeapi-publico
apiVersion: v1
kind: Service
metadata:
  name: pokeapi-publico
  namespace: prometheus-demo
  labels:
    app: pokeapi
spec:
  type: LoadBalancer
  selector:
    app: pokeapi
  ports:
    - name: http
      port: 80
      targetPort: http
