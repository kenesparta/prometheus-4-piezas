# Construye la imagen de la demo pokeapi (pokeapi/Dockerfile) y la publica en
# GitHub Packages (GHCR) como ghcr.io/<owner>/pokeapi:latest y :<sha corto>.
#
# No hay secrets que configurar: usa el GITHUB_TOKEN del propio workflow
# (permiso packages: write).
#
# Tras el PRIMER push el package nace privado: hacerlo público en la página
# del package → Package settings → Change visibility, para que el cluster
# pueda bajarlo sin imagePullSecret. k8s/60-pokeapi.yaml ya apunta a
# ghcr.io/kenesparta/pokeapi:latest.
name: pokeapi-imagen

on:
  push:
    branches: [main]
    paths:
      - "pokeapi/**"
      - ".github/workflows/pokeapi-imagen.yml"
  workflow_dispatch:

# Si llegan dos pushes seguidos, el build viejo ya no interesa.
concurrency:
  group: pokeapi-imagen
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGEN: ghcr.io/${{ github.repository_owner }}/pokeapi

jobs:
  construir-y-publicar:
    runs-on: ubuntu-latest
    # El build de Rust + Leptos (SSR + wasm) tarda ~15 min en 8 vCPU; en el
    # runner estándar puede tardar bastante más. Margen amplio sin llegar al
    # tope de 6 h por defecto.
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: SHA corto para el tag
        id: sha
        run: echo "corto=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Preparar buildx
        uses: docker/setup-buildx-action@v4

      - name: Login en GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y publicar
        uses: docker/build-push-action@v7
        with:
          context: pokeapi
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGEN }}:latest
            ${{ env.IMAGEN }}:${{ steps.sha.outputs.corto }}
          # Vincula el package con este repo en GitHub.
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          # Cachea entre corridas la capa cara del builder (target wasm +
          # cargo-leptos); la compilación en sí se repite en cada push porque
          # COPY . . invalida esa capa.
          cache-from: type=gha
          cache-to: type=gha,mode=max
